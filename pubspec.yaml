name: chefia_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  validatorless: ^1.2.5
  top_snackbar_flutter: ^3.3.0
  loading_animation_widget: ^1.3.0
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  firebase_core: ^4.8.0
  firebase_crashlytics: ^5.2.1
  logger: ^2.7.0
  brasil_fields: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  generate: true

  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto/Roboto-Light.ttf
          weight: 300

        - asset: assets/fonts/Roboto/Roboto-Regular.ttf
          weight: 400

        - asset: assets/fonts/Roboto/Roboto-Medium.ttf
          weight: 500

        - asset: assets/fonts/Roboto/Roboto-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700

        - asset: assets/fonts/Roboto/Roboto-ExtraBold.ttf
          weight: 800